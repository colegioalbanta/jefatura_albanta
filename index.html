<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jefatura Albanta</title>
    
    <!-- LOGO DE JEFATURA PARA PANTALLA DE INICIO -->
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1_pgEpIIG9cHCVHI_PH9tdFwAGmkKTAEg">
    <link rel="apple-touch-icon" sizes="180x180" href="https://lh3.googleusercontent.com/d/1_pgEpIIG9cHCVHI_PH9tdFwAGmkKTAEg">
    <link rel="icon" type="image/png" sizes="192x192" href="https://lh3.googleusercontent.com/d/1_pgEpIIG9cHCVHI_PH9tdFwAGmkKTAEg">
    <meta name="apple-mobile-web-app-title" content="Jefatura">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- Redirección automática a la Web App de Jefatura tras 1 segundo -->
    <!-- REEMPLAZA EL ENLACE DE ABAJO POR TU URL REAL DE GOOGLE APPS SCRIPT DE JEFATURA -->
    <meta http-equiv="refresh" content="1; url=https://script.google.com/a/macros/colegioalbanta.es/s/AKfycbyie0q1UoPagpyNsxinFbg6uLmQqohDfRq5nyvAfQ8npOXdZfRLVerTLMgco0oaLyPofA/exec?p=admin">
</head>
<body style="display:flex; justify-content:center; align-items:center; height:100vh; font-family:'Segoe UI', sans-serif; background:#f8fafc; margin:0;">
    <div style="text-align:center;">
        <!-- Imagen de carga con el logo de Jefatura -->
        <img src="https://lh3.googleusercontent.com/d/1_pgEpIIG9cHCVHI_PH9tdFwAGmkKTAEg" style="max-width:110px; height:auto; animation: pulse 2s infinite;" alt="Logo Jefatura">
        <p style="color:#64748b; margin-top:20px; font-weight:500; font-size:15px;">Abriendo el portal de jefatura...</p>
    </div>

    <style>
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
    </style>
</body>
</html>
